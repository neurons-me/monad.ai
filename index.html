<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>monad.ai</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font: 13px/1.35 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #runtime-controls {
        position: sticky;
        top: 0;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid #ddd;
        background: #fff;
        flex-wrap: wrap;
      }
      #runtime-controls label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #666;
      }
      #runtime-controls select {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 6px 8px;
        min-height: 32px;
        font: inherit;
      }
      .runtime-control {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 6px 8px;
        border: 1px solid #eee;
        border-radius: 10px;
        min-width: 150px;
      }
      .runtime-control.state-pending { border-color: #a2750a33; }
      .runtime-control.state-loaded { border-color: #0c7a4333; }
      .runtime-control.state-notfound { border-color: #a12c2c33; }
      .runtime-status {
        font-size: 10px;
        color: #666;
        line-height: 1.2;
      }
      .runtime-status strong {
        color: #111;
        font-weight: 700;
      }
      .runtime-status .state {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .runtime-status .state.pending { color: #a2750a; }
      .runtime-status .state.loaded { color: #0c7a43; }
      .runtime-status .state.notfound { color: #a12c2c; }
      .runtime-status .url {
        display: block;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .runtime-status .url-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .runtime-status .url-text {
        flex: 1;
        min-width: 0;
        font-size: 9px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #777;
      }
      .runtime-status .url-toggle {
        border: 0;
        padding: 0 2px;
        font-size: 9px;
        background: transparent;
        cursor: pointer;
        color: #1f5fff;
      }
    </style>
  </head>
  <body>
    <div id="runtime-controls">
      <div class="runtime-control state-pending" id="runtime-gui-box">
        <label for="gui-source">GUI</label>
        <select id="gui-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-gui-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-gui-url">-</span>
            <button class="url-toggle" id="runtime-gui-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
      <div class="runtime-control state-pending" id="runtime-cleaker-box">
        <label for="cleaker-source">Cleaker</label>
        <select id="cleaker-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-cleaker-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-cleaker-url">-</span>
            <button class="url-toggle" id="runtime-cleaker-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
      <div class="runtime-control state-pending" id="runtime-me-box">
        <label for="me-source">Me</label>
        <select id="me-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-me-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-me-url">-</span>
            <button class="url-toggle" id="runtime-me-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
    </div>
    <script>
      (async function () {
        const SOURCE_STORAGE_KEY = 'monad.runtime.sources.v2';
        const THIS_GUI_STABLE_VERSION = '1.4.89';
        const THIS_ME_CDN_VERSION = '3.4.7';
        const CLEAKER_CDN_VERSION = '3.0.4';
        const REACT_CDN_VERSION = '18.3.1';
        const REACTDOM_CDN_VERSION = '18.3.1';
        const GUI_LATEST_META_URL = 'https://registry.npmjs.org/this.gui/latest';
        const REMOTE_ASSET_TIMEOUT_MS = 8000;
        const IS_FILE_ORIGIN = window.location.protocol === 'file:';
        const defaultSource = IS_FILE_ORIGIN ? 'local' : 'cdn';
        const defaults = {
          gui: defaultSource,
          cleaker: defaultSource,
          me: defaultSource,
        };

        const controls = {
          gui: document.getElementById('gui-source'),
          cleaker: document.getElementById('cleaker-source'),
          me: document.getElementById('me-source'),
        };
        const statusEls = {
          guiBox: document.getElementById('runtime-gui-box'),
          guiState: document.getElementById('runtime-gui-state'),
          guiUrl: document.getElementById('runtime-gui-url'),
          guiToggle: document.getElementById('runtime-gui-toggle'),
          cleakerBox: document.getElementById('runtime-cleaker-box'),
          cleakerState: document.getElementById('runtime-cleaker-state'),
          cleakerUrl: document.getElementById('runtime-cleaker-url'),
          cleakerToggle: document.getElementById('runtime-cleaker-toggle'),
          meBox: document.getElementById('runtime-me-box'),
          meState: document.getElementById('runtime-me-state'),
          meUrl: document.getElementById('runtime-me-url'),
          meToggle: document.getElementById('runtime-me-toggle'),
        };

        const LOCAL_GUI_CSS = '../../this/GUI/npm/dist/styles.css';
        const LOCAL_GUI_BOOTSTRAP = '../../this/GUI/npm/dist/this.gui.umd.js';
        const LOCAL_REACT_UMD = '../../this/GUI/npm/node_modules/react/umd/react.production.min.js';
        const LOCAL_REACTDOM_UMD = '../../this/GUI/npm/node_modules/react-dom/umd/react-dom.production.min.js';
        const LOCAL_ME_UMD = '../../this/.me/npm/dist/me.umd.js';
        const LOCAL_CLEAKER_UMD = '../cleaker/npm/dist/cleaker.umd.js';
        const CDN_GUI_CSS = 'https://cdn.jsdelivr.net/npm/this.gui@' + THIS_GUI_STABLE_VERSION + '/dist/styles.css';
        const CDN_GUI_BOOTSTRAP = 'https://cdn.jsdelivr.net/npm/this.gui@' + THIS_GUI_STABLE_VERSION + '/dist/this.gui.umd.js';
        const CDN_REACT_UMD = 'https://cdn.jsdelivr.net/npm/react@' + REACT_CDN_VERSION + '/umd/react.production.min.js';
        const CDN_REACTDOM_UMD = 'https://cdn.jsdelivr.net/npm/react-dom@' + REACTDOM_CDN_VERSION + '/umd/react-dom.production.min.js';
        const CDN_ME_UMD = 'https://cdn.jsdelivr.net/npm/this.me@' + THIS_ME_CDN_VERSION + '/dist/me.umd.js';
        const CDN_CLEAKER_UMD = 'https://cdn.jsdelivr.net/npm/cleaker@' + CLEAKER_CDN_VERSION + '/dist/cleaker.umd.js';

        const loaded = new Set();
        let guiLatestAssetsPromise = null;

        function resolveAssetUrl(source, localUrl, cdnUrl) {
          const target = source === 'cdn' ? cdnUrl : localUrl;
          try {
            return new URL(target, window.location.href).href;
          } catch (_) {
            return target;
          }
        }

        function formatRuntimeDetail(version, url) {
          const origin = window.location.origin && window.location.origin !== 'null'
            ? window.location.origin
            : '';
          const shortUrl = String(url || '').replace(origin, '');
          return version ? ('v' + version + ' · ' + shortUrl) : shortUrl;
        }

        function setStatus(which, state, url, version) {
          const boxEl = statusEls[which + 'Box'];
          const stateEl = statusEls[which + 'State'];
          const urlEl = statusEls[which + 'Url'];
          const toggleEl = statusEls[which + 'Toggle'];
          if (boxEl) {
            boxEl.classList.remove('state-pending', 'state-loaded', 'state-notfound');
            boxEl.classList.add('state-' + state);
          }
          if (stateEl) {
            stateEl.textContent = state === 'loaded'
              ? 'Loaded'
              : state === 'notfound'
              ? 'NotFound'
              : 'Pending';
            stateEl.className = 'state ' + state;
          }
          if (urlEl) {
            const full = formatRuntimeDetail(version, url || '-');
            const isLong = full.length > 36;
            const short = isLong
              ? full.slice(0, 14) + '…' + full.slice(-10)
              : full;
            urlEl.textContent = short;
            urlEl.title = full;
            urlEl.dataset.full = full;
            urlEl.dataset.short = short;
            urlEl.dataset.expanded = 'false';
            if (toggleEl) {
              toggleEl.hidden = !isLong;
              toggleEl.textContent = 'expand';
            }
          }
        }

        function bindToggle(which) {
          const urlEl = statusEls[which + 'Url'];
          const toggleEl = statusEls[which + 'Toggle'];
          if (!urlEl || !toggleEl) return;
          toggleEl.addEventListener('click', function () {
            const expanded = urlEl.dataset.expanded === 'true';
            urlEl.textContent = expanded ? (urlEl.dataset.short || '-') : (urlEl.dataset.full || '-');
            urlEl.dataset.expanded = expanded ? 'false' : 'true';
            toggleEl.textContent = expanded ? 'expand' : 'collapse';
          });
        }

        function readSources() {
          try {
            const parsed = JSON.parse(localStorage.getItem(SOURCE_STORAGE_KEY) || '{}');
            const normalizeSource = function (value) {
              return value === 'local' || value === 'cdn' ? value : defaultSource;
            };
            return {
              gui: normalizeSource(parsed.gui),
              cleaker: normalizeSource(parsed.cleaker),
              me: normalizeSource(parsed.me),
            };
          } catch (_) {
            return { ...defaults };
          }
        }

        function writeSources(next) {
          try {
            localStorage.setItem(SOURCE_STORAGE_KEY, JSON.stringify(next));
          } catch (_) {}
        }

        function syncUi() {
          const saved = readSources();
          controls.gui.value = saved.gui;
          controls.cleaker.value = saved.cleaker;
          controls.me.value = saved.me;
        }

        function updateResolvedUrls() {
          const sources = readSources();
          setStatus('gui', 'pending', resolveAssetUrl(sources.gui, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP), sources.gui === 'cdn' ? 'latest' : null);
          setStatus('cleaker', 'pending', resolveAssetUrl(sources.cleaker, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD), sources.cleaker === 'cdn' ? CLEAKER_CDN_VERSION : null);
          setStatus('me', 'pending', resolveAssetUrl(sources.me, LOCAL_ME_UMD, CDN_ME_UMD), sources.me === 'cdn' ? THIS_ME_CDN_VERSION : null);
        }

        function reloadWithSelectedSources() {
          writeSources({
            gui: controls.gui && controls.gui.value === 'cdn' ? 'cdn' : 'local',
            cleaker: controls.cleaker && controls.cleaker.value === 'cdn' ? 'cdn' : 'local',
            me: controls.me && controls.me.value === 'cdn' ? 'cdn' : 'local',
          });
          window.location.reload();
        }

        [controls.gui, controls.cleaker, controls.me].forEach(function (control) {
          if (!control) return;
          control.addEventListener('change', reloadWithSelectedSources);
        });

        function isRemoteAssetUrl(value) {
          return /^https?:\/\//i.test(String(value || ''));
        }

        function loadStyle(href, options) {
          return new Promise(function (resolve, reject) {
            if (loaded.has(href)) return resolve(href);
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            const isRemote = isRemoteAssetUrl(href);
            let settled = false;
            let timeoutId = null;
            const cleanup = function () {
              if (timeoutId != null) {
                clearTimeout(timeoutId);
                timeoutId = null;
              }
              link.onload = null;
              link.onerror = null;
            };
            const finishResolve = function () {
              if (settled) return;
              settled = true;
              cleanup();
              loaded.add(href);
              resolve(href);
            };
            const finishReject = function (error) {
              if (settled) return;
              settled = true;
              cleanup();
              try { link.remove(); } catch (_) {}
              reject(error);
            };
            if (options && options.crossorigin) link.crossOrigin = options.crossorigin;
            if (isRemote) {
              timeoutId = window.setTimeout(function () {
                finishReject(new Error('Failed to load ' + href + ' (timeout)'));
              }, REMOTE_ASSET_TIMEOUT_MS);
            }
            link.onload = function () { finishResolve(); };
            link.onerror = function () {
              finishReject(new Error('Failed to load ' + href));
            };
            document.head.appendChild(link);
          });
        }

        function loadScript(src, options) {
          return new Promise(function (resolve, reject) {
            if (loaded.has(src)) return resolve(src);
            const script = document.createElement('script');
            script.src = src;
            script.async = false;
            const isRemote = isRemoteAssetUrl(src);
            let settled = false;
            let timeoutId = null;
            const cleanup = function () {
              if (timeoutId != null) {
                clearTimeout(timeoutId);
                timeoutId = null;
              }
              script.onload = null;
              script.onerror = null;
            };
            const finishResolve = function () {
              if (settled) return;
              settled = true;
              cleanup();
              loaded.add(src);
              resolve(src);
            };
            const finishReject = function (error) {
              if (settled) return;
              settled = true;
              cleanup();
              try { script.remove(); } catch (_) {}
              reject(error);
            };
            if (options && options.crossorigin) script.crossOrigin = options.crossorigin;
            if (isRemote) {
              timeoutId = window.setTimeout(function () {
                finishReject(new Error('Failed to load ' + src + ' (timeout)'));
              }, REMOTE_ASSET_TIMEOUT_MS);
            }
            script.onload = function () { finishResolve(); };
            script.onerror = function () {
              finishReject(new Error('Failed to load ' + src));
            };
            document.head.appendChild(script);
          });
        }

        async function probeLocalAsset(url) {
          if (IS_FILE_ORIGIN) return null;
          try {
            const resolved = new URL(url, window.location.href);
            if (resolved.origin !== window.location.origin) return null;
            const response = await fetch(resolved.href, {
              method: 'HEAD',
              cache: 'no-store',
            });
            if (response.status === 405 || response.status === 501) {
              return null;
            }
            return response.ok;
          } catch (_) {
            return false;
          }
        }

        function getAssetLoadCandidates(source, localSrc, cdnSrc) {
          if (source === 'local') {
            return [
              { source: 'local', url: resolveAssetUrl('local', localSrc, cdnSrc), options: undefined },
              { source: 'cdn', url: resolveAssetUrl('cdn', localSrc, cdnSrc), options: { crossorigin: 'anonymous' } },
            ];
          }
          return [
            { source: 'cdn', url: resolveAssetUrl('cdn', localSrc, cdnSrc), options: { crossorigin: 'anonymous' } },
            { source: 'local', url: resolveAssetUrl('local', localSrc, cdnSrc), options: undefined },
          ];
        }

        async function loadSelectedAsset(source, localSrc, cdnSrc, kind) {
          const candidates = getAssetLoadCandidates(source, localSrc, cdnSrc);
          const loader = kind === 'style' ? loadStyle : loadScript;
          let lastError = null;
          for (let i = 0; i < candidates.length; i += 1) {
            const candidate = candidates[i];
            try {
              if (candidate.source === 'local') {
                const available = await probeLocalAsset(candidate.url);
                if (available === false) {
                  lastError = new Error('Local asset not available: ' + candidate.url);
                  continue;
                }
              }
              await loader(candidate.url, candidate.options);
              return candidate;
            } catch (error) {
              lastError = error;
            }
          }
          throw lastError || new Error('Failed to load ' + kind + ' asset.');
        }

        async function loadRuntimeScriptWithFallback(source, localSrc, cdnSrc) {
          return loadSelectedAsset(source, localSrc, cdnSrc, 'script');
        }

        async function ensureReactRuntime(source) {
          const hasReact = Boolean(window.React && typeof window.React.createContext === 'function');
          const hasReactDOM = Boolean(window.ReactDOM && typeof window.ReactDOM.createRoot === 'function');
          if (!hasReact) {
            await loadRuntimeScriptWithFallback(source, LOCAL_REACT_UMD, CDN_REACT_UMD);
          }
          if (!hasReactDOM) {
            await loadRuntimeScriptWithFallback(source, LOCAL_REACTDOM_UMD, CDN_REACTDOM_UMD);
          }
        }

        function buildGuiVersionedAssets(version) {
          const normalized = String(version || '').trim();
          return {
            css: 'https://cdn.jsdelivr.net/npm/this.gui@' + normalized + '/dist/styles.css',
            js: 'https://cdn.jsdelivr.net/npm/this.gui@' + normalized + '/dist/this.gui.umd.js',
            version: normalized,
          };
        }

        function getGuiStableAssets() {
          return buildGuiVersionedAssets(THIS_GUI_STABLE_VERSION);
        }

        async function resolveGuiLatestAssets() {
          if (guiLatestAssetsPromise) return guiLatestAssetsPromise;
          guiLatestAssetsPromise = (async function () {
            try {
              const response = await fetch(GUI_LATEST_META_URL, { cache: 'no-store' });
              if (!response.ok) throw new Error('latest metadata failed: ' + response.status);
              const payload = await response.json();
              const version = String(payload && payload.version || '').trim();
              return version ? buildGuiVersionedAssets(version) : getGuiStableAssets();
            } catch (_) {
              return getGuiStableAssets();
            }
          })();
          return guiLatestAssetsPromise;
        }

        function getLocalGuiAssets() {
          return {
            css: resolveAssetUrl('local', LOCAL_GUI_CSS, CDN_GUI_CSS),
            js: resolveAssetUrl('local', LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP),
          };
        }

        async function loadGuiRuntimeAssets(source) {
          const latestAssets = await resolveGuiLatestAssets();
          const stableAssets = getGuiStableAssets();
          const localAssets = getLocalGuiAssets();
          const candidates = source === 'local'
            ? [
                { source: 'local', css: localAssets.css, js: localAssets.js, version: null, local: true },
                { source: 'stable', css: stableAssets.css, js: stableAssets.js, version: stableAssets.version, options: { crossorigin: 'anonymous' } },
                { source: 'latest', css: latestAssets.css, js: latestAssets.js, version: latestAssets.version, options: { crossorigin: 'anonymous' } },
              ]
            : [
                { source: 'latest', css: latestAssets.css, js: latestAssets.js, version: latestAssets.version, options: { crossorigin: 'anonymous' } },
                { source: 'stable', css: stableAssets.css, js: stableAssets.js, version: stableAssets.version, options: { crossorigin: 'anonymous' } },
                { source: 'local', css: localAssets.css, js: localAssets.js, version: null, local: true },
              ];
          let lastError = null;
          for (let i = 0; i < candidates.length; i += 1) {
            const candidate = candidates[i];
            try {
              if (candidate.local) {
                const cssAvailable = await probeLocalAsset(candidate.css);
                const jsAvailable = await probeLocalAsset(candidate.js);
                if (cssAvailable === false || jsAvailable === false) {
                  lastError = new Error('Local GUI runtime not available.');
                  continue;
                }
              }
              await loadStyle(candidate.css, candidate.options);
              await loadScript(candidate.js, candidate.options);
              return {
                source: candidate.source,
                url: candidate.js,
                css: candidate.css,
                version: candidate.version || null,
              };
            } catch (error) {
              lastError = error;
            }
          }
          throw lastError || new Error('Failed to load GUI runtime.');
        }

        async function loadGui(source) {
          setStatus('gui', 'pending', resolveAssetUrl(source, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP), source === 'cdn' ? 'latest' : null);
          try {
            await ensureReactRuntime(source);
            const asset = await loadGuiRuntimeAssets(source);
            const version =
              (window.GUI && (window.GUI.version || window.GUI.VERSION || window.GUI.__version)) ||
              asset.version ||
              null;
            setStatus('gui', 'loaded', asset.url, version);
          } catch (error) {
            const fallbackUrl = resolveAssetUrl(source, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP);
            setStatus('gui', 'notfound', fallbackUrl, source === 'cdn' ? THIS_GUI_STABLE_VERSION : null);
          }
        }

        async function loadCleaker(source) {
          setStatus('cleaker', 'pending', resolveAssetUrl(source, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD), source === 'cdn' ? CLEAKER_CDN_VERSION : null);
          try {
            const asset = await loadRuntimeScriptWithFallback(source, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD);
            const version = asset.source === 'cdn' ? CLEAKER_CDN_VERSION : null;
            setStatus('cleaker', 'loaded', asset.url, version);
          } catch (_) {
            setStatus('cleaker', 'notfound', resolveAssetUrl(source, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD), source === 'cdn' ? CLEAKER_CDN_VERSION : null);
          }
        }

        async function loadMe(source) {
          setStatus('me', 'pending', resolveAssetUrl(source, LOCAL_ME_UMD, CDN_ME_UMD), source === 'cdn' ? THIS_ME_CDN_VERSION : null);
          try {
            const asset = await loadRuntimeScriptWithFallback(source, LOCAL_ME_UMD, CDN_ME_UMD);
            const version = asset.source === 'cdn' ? THIS_ME_CDN_VERSION : null;
            setStatus('me', 'loaded', asset.url, version);
          } catch (_) {
            setStatus('me', 'notfound', resolveAssetUrl(source, LOCAL_ME_UMD, CDN_ME_UMD), source === 'cdn' ? THIS_ME_CDN_VERSION : null);
          }
        }

        syncUi();
        updateResolvedUrls();
        bindToggle('gui');
        bindToggle('cleaker');
        bindToggle('me');

        const sources = readSources();
        await loadGui(sources.gui);
        await loadCleaker(sources.cleaker);
        await loadMe(sources.me);
      })();
    </script>
  </body>
</html>
