<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>monad.ai</title>
    <link rel="icon" href="/gui/favicon.ico" />
    <link rel="stylesheet" href="/gui/styles.css" />
    <script>
      (function () {
        var build = "20260404-inspectorjson1";
        window.__THIS_GUI_DISABLE_AUTOBOOT__ = true;
        window.__THIS_GUI_BOOTSTRAP_ASSETS__ = {
          css: "/gui/styles.css?v=" + build,
          gui: "/gui/this.gui.umd.js?v=" + build,
          react: "/vendor/react/react.production.min.js?v=" + build,
          reactDom: "/vendor/react-dom/react-dom.production.min.js?v=" + build,
        };
      })();
    </script>
    <script
      src="/gui/this.gui.bootstrap.umd.js?v=20260404-inspectorjson1"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const root = document.getElementById("root");
      const BOOT_BUILD = "20260404-inspectorjson1";
      window.__THIS_GUI_DISABLE_AUTOBOOT__ = true;
      const ME_RUNTIME_CANDIDATES = [
        `/me/me.umd.js?v=${BOOT_BUILD}`,
        `../../this/.me/npm/dist/me.umd.js?v=${BOOT_BUILD}`,
        `/this/.me/npm/dist/me.umd.js?v=${BOOT_BUILD}`,
        "https://cdn.jsdelivr.net/npm/this.me@3.4.7/dist/me.umd.js",
      ];
      const SCRIPT_LOADED_ATTR = "data-runtime-loaded";
      const pendingScripts = new Map();
      let bootCompleted = false;
      let bootStep = "init";
      let bootTicker = null;
      let bootLog = [];
      const bootLogSeen = new Map();

      const BOOT_PHASES = [
        {
          label: "Route Handshake",
          caption: "Linking the entry graph and route surface.",
        },
        {
          label: "GUI Runtime",
          caption: "Priming visuals, React, and the boot transport.",
        },
        {
          label: "Semantic Kernel",
          caption: "Loading and shaping the `.me` runtime.",
        },
        {
          label: "Runtime Assembly",
          caption: "Binding GUI, kernel, and router into one surface.",
        },
        {
          label: "Route Binding",
          caption: "Attaching namespace routes and dispatch rules.",
        },
        {
          label: "Surface Resolve",
          caption: "Resolving the active namespace surface.",
        },
        {
          label: "Layout Mount",
          caption: "Rendering the shell, sidebars, and namespace view.",
        },
        {
          label: "System Online",
          caption: "Boot complete. Handing off to the live interface.",
        },
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function ensureBootStyles() {
        if (document.getElementById("monad-boot-styles")) return;
        const style = document.createElement("style");
        style.id = "monad-boot-styles";
        style.textContent = `
          :root {
            color-scheme: dark;
            --boot-bg: #05080b;
            --boot-text: #d7e5dd;
            --boot-muted: #7c8f89;
            --boot-accent: #8ff7dc;
            --boot-accent-dim: #21443b;
            --boot-warn: #ffd27a;
            --boot-danger: #ff8da8;
            --boot-line: #121a1f;
            --boot-font: "IBM Plex Mono", "Space Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
          }
          body {
            margin: 0;
            background: var(--boot-bg);
            color: var(--boot-text);
            font-family: var(--boot-font);
          }
          #root {
            min-height: 100vh;
          }
          .boot-shell {
            min-height: 100vh;
            padding: 24px;
            box-sizing: border-box;
          }
          .boot-wrap {
            max-width: 760px;
          }
          .boot-head {
            margin-bottom: 10px;
            color: var(--boot-accent);
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
          }
          .boot-build {
            color: var(--boot-muted);
            font-size: 12px;
            margin-bottom: 18px;
          }
          .boot-title {
            margin: 0;
            font-size: 15px;
            line-height: 1.5;
            color: var(--boot-text);
          }
          .boot-copy {
            margin: 8px 0 0;
            color: var(--boot-muted);
            line-height: 1.6;
            font-size: 12px;
          }
          .boot-progress {
            position: relative;
            height: 6px;
            background: var(--boot-line);
            overflow: hidden;
            margin: 18px 0 16px;
          }
          .boot-progress > span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--boot-accent-dim), var(--boot-accent));
            transition: width 180ms ease;
          }
          .boot-phase {
            color: var(--boot-text);
            font-size: 13px;
            margin-bottom: 6px;
          }
          .boot-phase strong {
            color: var(--boot-text);
          }
          .boot-phase-copy {
            color: var(--boot-muted);
            font-size: 12px;
            line-height: 1.6;
          }
          .boot-log {
            margin: 16px 0 0;
            padding: 0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            font-size: 12px;
            color: var(--boot-muted);
          }
          .boot-shell.is-stalled .boot-head,
          .boot-shell.is-stalled .boot-title {
            color: var(--boot-warn);
          }
          .boot-shell.is-error .boot-head,
          .boot-shell.is-error .boot-title {
            color: var(--boot-danger);
          }
        `;
        document.head.appendChild(style);
      }

      function setBootStep(step, detail = "") {
        bootStep = detail ? `${step}: ${detail}` : step;
        window.__MONAD_BOOT_STEP__ = bootStep;
      }

      function formatGuiBootstrapStatus() {
        const status = window.__THIS_GUI_BOOTSTRAP_STATUS__;
        if (!status || typeof status !== "object") return "GUI bootstrap step: unknown";
        const step = status.step || "unknown";
        const detail = status.detail ? ` (${status.detail})` : "";
        return `GUI bootstrap step: ${step}${detail}`;
      }

      function formatAppStatus() {
        const status = window.__THIS_GUI_APP_BOOT_STATUS__;
        if (!status || typeof status !== "object") return "App boot step: unknown";
        const step = status.step || "unknown";
        const detail = status.detail ? ` (${status.detail})` : "";
        return `App boot step: ${step}${detail}`;
      }

      function formatRouterStatus() {
        const status = window.__THIS_GUI_ROUTER_STATUS__;
        if (!status || typeof status !== "object") return "Router step: unknown";
        const step = status.step || "unknown";
        const detail = status.detail ? ` (${status.detail})` : "";
        return `Router step: ${step}${detail}`;
      }

      function formatProviderStatus() {
        const status = window.__THIS_GUI_PROVIDER_STATUS__;
        if (!status || typeof status !== "object") return "Provider step: unknown";
        const step = status.step || "unknown";
        const detail = status.detail ? ` (${status.detail})` : "";
        return `Provider step: ${step}${detail}`;
      }

      function deriveBootPhase() {
        const gui = window.__THIS_GUI_BOOTSTRAP_STATUS__?.step || "";
        const app = window.__THIS_GUI_APP_BOOT_STATUS__?.step || "";
        const router = window.__THIS_GUI_ROUTER_STATUS__?.step || "";
        const provider = window.__THIS_GUI_PROVIDER_STATUS__?.step || "";
        const combined = [bootStep, gui, app, router, provider].join(" ");

        if (
          bootCompleted ||
          /router:start:done/.test(app) ||
          /router:navigate:done|router:mount:done/.test(router)
        ) {
          return { index: 7, raw: "handoff complete" };
        }
        if (/router:mount:start|router:mount:done/.test(router)) {
          return { index: 6, raw: router || "router:mount:start" };
        }
        if (/provider:get-surface|router:resolve|router:navigate:start/.test(combined)) {
          return { index: 5, raw: provider || router || "surface resolve" };
        }
        if (/register routes|register-routes|router:start/.test(combined)) {
          return { index: 4, raw: app || bootStep };
        }
        if (/runtime:create|runtime:ready|router:create|router:ready|start app|route-derived/.test(combined)) {
          return { index: 3, raw: app || bootStep };
        }
        if (/load me runtime|construct me|create-me/.test(combined)) {
          return { index: 2, raw: app || bootStep };
        }
        if (/bootstrap gui|bootstrap:/.test(combined)) {
          return { index: 1, raw: gui || bootStep };
        }
        if (/import route/.test(combined)) {
          return { index: 0, raw: bootStep };
        }
        return { index: 0, raw: "handshake pending" };
      }

      function collectBootLines(extraLines = []) {
        return [
          `build: ${BOOT_BUILD}`,
          `last step: ${bootStep}`,
          formatGuiBootstrapStatus(),
          formatAppStatus(),
          formatRouterStatus(),
          formatProviderStatus(),
          ...extraLines,
        ];
      }

      function pushBootLine(key, line) {
        const value = String(line ?? "").trim();
        if (!value) return;
        if (bootLogSeen.get(key) === value) return;
        bootLogSeen.set(key, value);
        bootLog.push(value);
        if (bootLog.length > 18) bootLog = bootLog.slice(-18);
      }

      function syncBootLog(message, detailLines = [], state = "normal") {
        const phase = deriveBootPhase();
        pushBootLine("build", `[build] ${BOOT_BUILD}`);
        pushBootLine("title", `[title] ${message}`);
        pushBootLine("phase", `[phase] ${phase.label}`);
        pushBootLine("raw", `[trace] ${phase.raw}`);
        pushBootLine("boot", `[boot] ${bootStep}`);
        pushBootLine("gui", `[gui] ${formatGuiBootstrapStatus().replace("GUI bootstrap step: ", "")}`);
        pushBootLine("app", `[app] ${formatAppStatus().replace("App boot step: ", "")}`);
        pushBootLine("router", `[router] ${formatRouterStatus().replace("Router step: ", "")}`);
        pushBootLine("provider", `[provider] ${formatProviderStatus().replace("Provider step: ", "")}`);
        if (state !== "normal") {
          pushBootLine("state", `[state] ${state}`);
        }
        detailLines.forEach((line, index) => {
          pushBootLine(`detail:${index}`, `[diag] ${line}`);
        });
      }

      function renderBootScreen(message, detailLines = [], state = "normal") {
        if (!root) return;
        ensureBootStyles();
        const phase = deriveBootPhase();
        const progress = Math.max(10, ((phase.index + 1) / BOOT_PHASES.length) * 100);
        const summary =
          state === "error"
            ? "Boot fault intercepted before UI handoff."
            : state === "stalled"
              ? "Boot paused on one stage. The live log below shows the last successful handoff."
              : "Boot log active. Current stage and loader progress update live below.";
        syncBootLog(message, detailLines, state);
        root.innerHTML = `
          <section class="boot-shell ${state === "stalled" ? "is-stalled" : ""} ${state === "error" ? "is-error" : ""}">
            <div class="boot-wrap">
              <div class="boot-head">monad.ai boot</div>
              <div class="boot-build">build ${escapeHtml(BOOT_BUILD)}</div>
              <div class="boot-title">${escapeHtml(message)}</div>
              <div class="boot-copy">${escapeHtml(summary)}</div>
              <div class="boot-progress"><span style="width:${progress}%"></span></div>
              <div class="boot-phase"><strong>${escapeHtml(phase.label)}</strong> :: ${escapeHtml(phase.raw)}</div>
              <div class="boot-phase-copy">${escapeHtml(BOOT_PHASES[phase.index].caption)}</div>
              <pre class="boot-log">${escapeHtml(bootLog.join("\n"))}</pre>
            </div>
          </section>
        `;
      }

      function startBootTicker(title) {
        if (bootTicker) window.clearInterval(bootTicker);
        renderBootScreen(title, [], "normal");
        bootTicker = window.setInterval(() => {
          if (bootCompleted) {
            window.clearInterval(bootTicker);
            bootTicker = null;
            return;
          }
          renderBootScreen(title, [], "normal");
        }, 180);
      }

      function stopBootTicker() {
        if (!bootTicker) return;
        window.clearInterval(bootTicker);
        bootTicker = null;
      }

      startBootTicker("MONAD.AI");

      window.addEventListener("error", (event) => {
        const detail = event?.error?.stack || event?.message || "Unknown boot error";
        stopBootTicker();
        renderBootScreen("[MONAD.AI] WINDOW ERROR", [detail], "error");
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event?.reason;
        const detail =
          reason?.stack ||
          reason?.message ||
          (typeof reason === "string" ? reason : JSON.stringify(reason, null, 2));
        stopBootTicker();
        renderBootScreen("[MONAD.AI] UNHANDLED REJECTION", [detail], "error");
      });

      window.setTimeout(() => {
        if (!bootCompleted) {
          stopBootTicker();
          renderBootScreen(
            "[MONAD.AI] BOOT STALLED",
            [
              `GUI bootstrap expected: /gui/this.gui.bootstrap.umd.js?v=${BOOT_BUILD}`,
              `GUI runtime expected: /gui/this.gui.umd.js?v=${BOOT_BUILD}`,
              `ME runtime expected: /me/me.umd.js?v=${BOOT_BUILD}`,
            ],
            "stalled",
          );
        }
      }, 4000);

      function resolveMeCtor() {
        const candidates = [
          window.Me,
          window.ME,
          globalThis.Me,
          globalThis.ME,
        ];

        for (const candidate of candidates) {
          if (typeof candidate === "function") return candidate;
          if (candidate && typeof candidate.ME === "function") return candidate.ME;
          if (candidate && typeof candidate.default === "function") return candidate.default;
          if (candidate && candidate.default && typeof candidate.default.ME === "function") {
            return candidate.default.ME;
          }
        }

        return null;
      }

      function loadScriptOnce(src) {
        if (!src) return Promise.reject(new Error("Missing script src"));
        if (pendingScripts.has(src)) return pendingScripts.get(src);
        const existing = Array.from(document.querySelectorAll("script[src]")).find(
          (node) => node.src === new URL(src, document.baseURI).href,
        );
        if (existing && existing.getAttribute(SCRIPT_LOADED_ATTR) === "true") return Promise.resolve(true);

        const promise = new Promise((resolve, reject) => {
          const script = existing || document.createElement("script");
          if (!existing) {
            script.src = src;
            if (/^https?:/i.test(src)) script.crossOrigin = "anonymous";
          }
          script.onload = () => {
            script.setAttribute(SCRIPT_LOADED_ATTR, "true");
            resolve(true);
          };
          script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
          if (!existing) document.head.appendChild(script);
        }).finally(() => {
          pendingScripts.delete(src);
        });
        pendingScripts.set(src, promise);
        return promise;
      }

      let meRuntimePromise = null;
      async function ensureMeRuntime() {
        const existingCtor = resolveMeCtor();
        if (typeof existingCtor === "function") return existingCtor;
        if (!meRuntimePromise) {
          meRuntimePromise = (async () => {
            let lastError = null;
            for (const src of ME_RUNTIME_CANDIDATES) {
              try {
                await loadScriptOnce(src);
                const ctor = resolveMeCtor();
                if (typeof ctor === "function") return ctor;
                lastError = new Error(`.me runtime loaded but no constructor was exposed: ${src}`);
              } catch (error) {
                lastError = error;
              }
            }
            throw lastError || new Error("Failed to load .me runtime");
          })().catch((error) => {
            meRuntimePromise = null;
            throw error;
          });
        }
        return meRuntimePromise;
      }

      async function importFirst(candidates) {
        let lastError = null;
        for (const candidate of candidates) {
          try {
            return await import(candidate);
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("Failed to import module");
      }

      try {
        setBootStep("import routes");
        const { registerMonadRoutes } = await importFirst([
          "./routes.js",
          "/routes.js",
        ]);

        setBootStep("bootstrap gui");
        const GUI =
          typeof window.bootGUI === "function"
            ? await window.bootGUI()
            : window.ThisGUI || window.thisGUI || window.GUI || window["this.gui"];

        if (!GUI || typeof GUI.startApp !== "function") {
          throw new Error("GUI startApp missing");
        }

        const boot = window.__MONAD_NAMESPACE_PROVIDER_BOOT__;
        if (!boot) {
          throw new Error("Namespace provider boot missing");
        }

        if (typeof window.__MONAD_CREATE_NAMESPACE_PROVIDER__ !== "function") {
          throw new Error("Namespace provider factory missing");
        }

        window.GUI = GUI;
        window.provider = window.__MONAD_CREATE_NAMESPACE_PROVIDER__(GUI);
        window.monadProvider = window.provider;

        setBootStep("load me runtime");
        const MeCtor = await ensureMeRuntime();
        setBootStep("construct me");
        const me = new MeCtor();

        setBootStep("start app");
        await GUI.startApp({
          root,
          basePath: "/",
          me,
          registerRoutes(router) {
            setBootStep("register routes");
            return registerMonadRoutes(router, {
              provider: window.provider,
              namespace: boot.namespace,
              gui: GUI,
              boot,
            });
          },
          gui: GUI,
        });
        stopBootTicker();
        setBootStep("ready");
        bootCompleted = true;
      } catch (error) {
        stopBootTicker();
        renderBootScreen(
          "[MONAD.AI] BOOT FAULT",
          [error?.stack || error?.message || String(error)],
          "error",
        );
        console.error("[monad.ai]", error);
      }
    </script>
  </body>
</html>
