<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>monad.ai</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font: 13px/1.35 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #runtime-controls {
        position: sticky;
        top: 0;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid #ddd;
        background: #fff;
        flex-wrap: wrap;
      }
      #runtime-controls label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #666;
      }
      #runtime-controls select {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 6px 8px;
        min-height: 32px;
        font: inherit;
      }
      .runtime-control {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 6px 8px;
        border: 1px solid #eee;
        border-radius: 10px;
        min-width: 150px;
      }
      .runtime-control.state-pending { border-color: #a2750a33; }
      .runtime-control.state-loaded { border-color: #0c7a4333; }
      .runtime-control.state-notfound { border-color: #a12c2c33; }
      .runtime-status {
        font-size: 10px;
        color: #666;
        line-height: 1.2;
      }
      .runtime-status strong {
        color: #111;
        font-weight: 700;
      }
      .runtime-status .state {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .runtime-status .state.pending { color: #a2750a; }
      .runtime-status .state.loaded { color: #0c7a43; }
      .runtime-status .state.notfound { color: #a12c2c; }
      .runtime-status .url {
        display: block;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .runtime-status .url-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .runtime-status .url-text {
        flex: 1;
        min-width: 0;
        font-size: 9px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #777;
      }
      .runtime-status .url-toggle {
        border: 0;
        padding: 0 2px;
        font-size: 9px;
        background: transparent;
        cursor: pointer;
        color: #1f5fff;
      }
    </style>
  </head>
  <body>
    <div id="runtime-controls">
      <div class="runtime-control state-pending" id="runtime-gui-box">
        <label for="gui-source">GUI</label>
        <select id="gui-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-gui-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-gui-url">-</span>
            <button class="url-toggle" id="runtime-gui-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
      <div class="runtime-control state-pending" id="runtime-cleaker-box">
        <label for="cleaker-source">Cleaker</label>
        <select id="cleaker-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-cleaker-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-cleaker-url">-</span>
            <button class="url-toggle" id="runtime-cleaker-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
      <div class="runtime-control state-pending" id="runtime-me-box">
        <label for="me-source">Me</label>
        <select id="me-source">
          <option value="local" selected>local</option>
          <option value="cdn">cdn</option>
        </select>
        <div class="runtime-status">
          <span class="state pending" id="runtime-me-state">pending</span>
          <span class="url-row">
            <span class="url-text" id="runtime-me-url">-</span>
            <button class="url-toggle" id="runtime-me-toggle" type="button" hidden>expand</button>
          </span>
        </div>
      </div>
    </div>
    <script>
      const SOURCE_STORAGE_KEY = 'monad.runtime.sources.v1';
      const defaults = { gui: 'cdn', cleaker: 'cdn', me: 'cdn' };
      const guiSelect = document.getElementById('gui-source');
      const cleakerSelect = document.getElementById('cleaker-source');
      const meSelect = document.getElementById('me-source');
      const statusEls = {
        guiBox: document.getElementById('runtime-gui-box'),
        guiState: document.getElementById('runtime-gui-state'),
        guiUrl: document.getElementById('runtime-gui-url'),
        guiToggle: document.getElementById('runtime-gui-toggle'),
        cleakerBox: document.getElementById('runtime-cleaker-box'),
        cleakerState: document.getElementById('runtime-cleaker-state'),
        cleakerUrl: document.getElementById('runtime-cleaker-url'),
        cleakerToggle: document.getElementById('runtime-cleaker-toggle'),
        meBox: document.getElementById('runtime-me-box'),
        meState: document.getElementById('runtime-me-state'),
        meUrl: document.getElementById('runtime-me-url'),
        meToggle: document.getElementById('runtime-me-toggle'),
      };

      const LOCAL_GUI_CSS = '../../this/GUI/npm/dist/styles.css';
      const LOCAL_GUI_BOOTSTRAP = '../../this/GUI/npm/dist/this.gui.umd.js';
      const LOCAL_REACT_UMD = '../../this/GUI/npm/node_modules/react/umd/react.production.min.js';
      const LOCAL_REACTDOM_UMD = '../../this/GUI/npm/node_modules/react-dom/umd/react-dom.production.min.js';
      const LOCAL_ME_UMD = '../../this/.me/npm/dist/me.umd.js';
      const LOCAL_CLEAKER_UMD = '../cleaker/npm/dist/cleaker.umd.js';
      const CDN_GUI_CSS = 'https://cdn.jsdelivr.net/npm/this.gui@latest/dist/styles.css';
      const CDN_GUI_BOOTSTRAP = 'https://cdn.jsdelivr.net/npm/this.gui@latest/dist/this.gui.umd.js';
      const CDN_REACT_UMD = 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js';
      const CDN_REACTDOM_UMD = 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js';
      const CDN_ME_UMD = 'https://cdn.jsdelivr.net/npm/this.me@latest/dist/me.umd.js';
      const CDN_CLEAKER_UMD = 'https://cdn.jsdelivr.net/npm/cleaker@latest/dist/cleaker.umd.js';
      const loaded = new Set();
      function resolveAssetUrl(source, localUrl, cdnUrl) {
        return source === 'cdn' ? cdnUrl : localUrl;
      }

      function formatRuntimeDetail(version, url) {
        const shortUrl = String(url || '').replace(window.location.origin, '');
        return version ? ('v' + version + ' · ' + shortUrl) : shortUrl;
      }

      function getVersionLabel(which, source) {
        if (which === 'gui') {
          if (source === 'cdn') return 'latest';
          return (window.GUI && window.GUI.version) || 'latest';
        }
        return 'latest';
      }

      function setStatus(which, state, url, version) {
        const boxEl = statusEls[which + 'Box'];
        const stateEl = statusEls[which + 'State'];
        const urlEl = statusEls[which + 'Url'];
        const toggleEl = statusEls[which + 'Toggle'];
        if (boxEl) {
          boxEl.classList.remove('state-pending', 'state-loaded', 'state-notfound');
          boxEl.classList.add('state-' + state);
        }
        if (stateEl) {
          stateEl.textContent = state === 'loaded'
            ? 'Loaded'
            : state === 'notfound'
            ? 'NotFound'
            : 'Pending';
          stateEl.className = 'state ' + state;
        }
        if (urlEl) {
          const full = formatRuntimeDetail(version, url || '-');
          const isLong = full.length > 36;
          const short = isLong
            ? `${full.slice(0, 14)}…${full.slice(-10)}`
            : full;
          urlEl.textContent = short;
          urlEl.title = full;
          urlEl.dataset.full = full;
          urlEl.dataset.short = short;
          urlEl.dataset.expanded = 'false';
          if (toggleEl) {
            toggleEl.hidden = !isLong;
            toggleEl.textContent = 'expand';
          }
        }
      }

      function bindToggle(which) {
        const urlEl = statusEls[which + 'Url'];
        const toggleEl = statusEls[which + 'Toggle'];
        if (!urlEl || !toggleEl) return;
        toggleEl.addEventListener('click', () => {
          const expanded = urlEl.dataset.expanded === 'true';
          urlEl.textContent = expanded ? urlEl.dataset.short || '-' : urlEl.dataset.full || '-';
          urlEl.dataset.expanded = expanded ? 'false' : 'true';
          toggleEl.textContent = expanded ? 'expand' : 'collapse';
        });
      }

      function loadAsset(url, type) {
        return new Promise((resolve, reject) => {
          if (loaded.has(url)) return resolve();
          let el;
          if (type === 'style') {
            el = document.createElement('link');
            el.rel = 'stylesheet';
            el.href = url;
          } else {
            el = document.createElement('script');
            el.src = url;
            el.async = true;
          }
          el.onload = () => {
            loaded.add(url);
            resolve();
          };
          el.onerror = (err) => reject(err);
          document.head.appendChild(el);
        });
      }

      async function ensureReactRuntime(source) {
        if (window.React && window.ReactDOM) return;
        const reactUrl = resolveAssetUrl(source, LOCAL_REACT_UMD, CDN_REACT_UMD);
        const reactDomUrl = resolveAssetUrl(source, LOCAL_REACTDOM_UMD, CDN_REACTDOM_UMD);
        await loadAsset(reactUrl, 'script');
        await loadAsset(reactDomUrl, 'script');
      }

      function readSources() {
        try {
          const parsed = JSON.parse(localStorage.getItem(SOURCE_STORAGE_KEY) || '{}');
          return {
            gui: parsed.gui === 'cdn' ? 'cdn' : defaults.gui,
            cleaker: parsed.cleaker === 'cdn' ? 'cdn' : defaults.cleaker,
            me: parsed.me === 'cdn' ? 'cdn' : defaults.me,
          };
        } catch {
          return { ...defaults };
        }
      }

      function writeSources(next) {
        try {
          localStorage.setItem(SOURCE_STORAGE_KEY, JSON.stringify(next));
        } catch {
          // ignore
        }
      }

      function syncUi() {
        const saved = readSources();
        guiSelect.value = saved.gui;
        cleakerSelect.value = saved.cleaker;
        meSelect.value = saved.me;
      }

      function updateResolvedUrls() {
        const sources = readSources();
        setStatus(
          'gui',
          'pending',
          resolveAssetUrl(sources.gui, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP),
          getVersionLabel('gui', sources.gui)
        );
        setStatus(
          'cleaker',
          'pending',
          resolveAssetUrl(sources.cleaker, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD),
          getVersionLabel('cleaker', sources.cleaker)
        );
        setStatus(
          'me',
          'pending',
          resolveAssetUrl(sources.me, LOCAL_ME_UMD, CDN_ME_UMD),
          getVersionLabel('me', sources.me)
        );
      }

      async function loadGui(source) {
        const primaryUrl = resolveAssetUrl(source, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP);
        const fallbackSource = source === 'local' ? 'cdn' : source;
        const fallbackUrl = resolveAssetUrl(fallbackSource, LOCAL_GUI_BOOTSTRAP, CDN_GUI_BOOTSTRAP);
        setStatus('gui', 'pending', primaryUrl, getVersionLabel('gui', source));
        try {
          await ensureReactRuntime(source);
          await loadAsset(resolveAssetUrl(source, LOCAL_GUI_CSS, CDN_GUI_CSS), 'style');
          await loadAsset(primaryUrl, 'script');
          setStatus('gui', 'loaded', primaryUrl, (window.GUI && window.GUI.version) || getVersionLabel('gui', source));
        } catch {
          if (source === 'local') {
            try {
              await ensureReactRuntime('cdn');
              await loadAsset(CDN_GUI_CSS, 'style');
              await loadAsset(fallbackUrl, 'script');
              setStatus('gui', 'loaded', fallbackUrl, (window.GUI && window.GUI.version) || getVersionLabel('gui', 'cdn'));
              return;
            } catch {
              // fall through to notfound
            }
          }
          setStatus('gui', 'notfound', fallbackUrl, getVersionLabel('gui', fallbackSource));
        }
      }

      async function loadMe(source) {
        const primaryUrl = resolveAssetUrl(source, LOCAL_ME_UMD, CDN_ME_UMD);
        const fallbackSource = source === 'local' ? 'cdn' : source;
        const fallbackUrl = resolveAssetUrl(fallbackSource, LOCAL_ME_UMD, CDN_ME_UMD);
        setStatus('me', 'pending', primaryUrl, getVersionLabel('me', source));
        try {
          await loadAsset(primaryUrl, 'script');
          setStatus('me', 'loaded', primaryUrl, getVersionLabel('me', source));
        } catch {
          if (source === 'local') {
            try {
              await loadAsset(fallbackUrl, 'script');
              setStatus('me', 'loaded', fallbackUrl, getVersionLabel('me', 'cdn'));
              return;
            } catch {
              // fall through to notfound
            }
          }
          setStatus('me', 'notfound', fallbackUrl, getVersionLabel('me', fallbackSource));
        }
      }

      async function loadCleaker(source) {
        const primaryUrl = resolveAssetUrl(source, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD);
        const fallbackSource = source === 'local' ? 'cdn' : source;
        const fallbackUrl = resolveAssetUrl(fallbackSource, LOCAL_CLEAKER_UMD, CDN_CLEAKER_UMD);
        setStatus('cleaker', 'pending', primaryUrl, getVersionLabel('cleaker', source));
        try {
          await loadAsset(primaryUrl, 'script');
          setStatus('cleaker', 'loaded', primaryUrl, getVersionLabel('cleaker', source));
        } catch {
          if (source === 'local') {
            try {
              await loadAsset(fallbackUrl, 'script');
              setStatus('cleaker', 'loaded', fallbackUrl, getVersionLabel('cleaker', 'cdn'));
              return;
            } catch {
              // fall through to notfound
            }
          }
          setStatus('cleaker', 'notfound', fallbackUrl, getVersionLabel('cleaker', fallbackSource));
        }
      }

      [guiSelect, cleakerSelect, meSelect].forEach((el) => {
        el.addEventListener('change', () => {
          writeSources({
            gui: guiSelect.value,
            cleaker: cleakerSelect.value,
            me: meSelect.value,
          });
          if (el === guiSelect) loadGui(guiSelect.value);
          if (el === cleakerSelect) loadCleaker(cleakerSelect.value);
          if (el === meSelect) loadMe(meSelect.value);
        });
      });

      syncUi();
      updateResolvedUrls();
      bindToggle('gui');
      bindToggle('cleaker');
      bindToggle('me');
      loadGui(guiSelect.value);
      loadCleaker(cleakerSelect.value);
      loadMe(meSelect.value);
    </script>
  </body>
</html>
